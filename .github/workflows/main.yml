# Camlock Roblox System - PlayStation Style
metadata:
  name: "PS_Camlock_System"
  version: "1.0.0"
  author: "Developer"
  description: "Camlock system for Players and NPCs with PS Controller support"

configuration:
  keys:
    keyboard: "C"
    gamepad: "ButtonL2"
  combat:
    max_distance: 100
    smoothness: 0.15
    auto_unlock_on_death: true
  visuals:
    crosshair_id: "rbxassetid://6031068433"
    crosshair_color: [255, 0, 0]
    rotation_speed: 4

# Source code diletakkan dalam block scalar agar tetap terbaca sebagai Lua
script_source: |
  local Players = game:GetService("Players")
  local UserInputService = game:GetService("UserInputService")
  local RunService = game:GetService("RunService")

  local player = Players.LocalPlayer
  local camera = workspace.CurrentCamera
  local isLocked, currentTarget = false, nil

  -- GUI Setup
  local screenGui = Instance.new("ScreenGui", player.PlayerGui)
  local crosshair = Instance.new("ImageLabel", screenGui)
  crosshair.Size = UDim2.new(0, 50, 0, 50)
  crosshair.BackgroundTransparency = 1
  crosshair.Image = "rbxassetid://6031068433"
  crosshair.ImageColor3 = Color3.fromRGB(255, 0, 0)
  crosshair.AnchorPoint = Vector2.new(0.5, 0.5)
  crosshair.Visible = false

  local function getNearestTarget()
      local nearestDist, nearestChar = 100, nil
      for _, obj in pairs(workspace:GetDescendants()) do
          if obj:IsA("Humanoid") and obj.Parent ~= player.Character and obj.Health > 0 then
              local root = obj.Parent:FindFirstChild("HumanoidRootPart")
              if root then
                  local dist = (player.Character.HumanoidRootPart.Position - root.Position).Magnitude
                  if dist < nearestDist then
                      nearestDist = dist
                      nearestChar = obj.Parent
                  end
              end
          end
      end
      return nearestChar
  end

  UserInputService.InputBegan:Connect(function(input, gpe)
      if gpe then return end
      if input.KeyCode == Enum.KeyCode.C or input.KeyCode == Enum.KeyCode.ButtonL2 then
          isLocked = not isLocked
          currentTarget = isLocked and getNearestTarget() or nil
      end
  end)

  RunService:BindToRenderStep("PS_Camlock", 201, function()
      if isLocked and currentTarget and currentTarget:FindFirstChild("HumanoidRootPart") then
          local root = currentTarget.HumanoidRootPart
          camera.CFrame = camera.CFrame:Lerp(CFrame.new(camera.CFrame.Position, root.Position), 0.15)
          local pos, onScreen = camera:WorldToScreenPoint(root.Position)
          if onScreen then
              crosshair.Visible, crosshair.Position = true, UDim2.new(0, pos.X, 0, pos.Y)
              crosshair.Rotation += 4
          else crosshair.Visible = false end
      else isLocked, crosshair.Visible = false, false end
  end)
