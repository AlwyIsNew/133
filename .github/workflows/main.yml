local Players = game:GetService("Players")
local UserInputService = game:GetService("UserInputService")
local RunService = game:GetService("RunService")
local TweenService = game:GetService("TweenService")

local player = Players.LocalPlayer
local camera = workspace.CurrentCamera

local isLocked = false
local currentTarget = nil
local maxLockDistance = 100

-- Input Settings
local keyboardKey = Enum.KeyCode.C
local gamepadKey = Enum.KeyCode.ButtonL2

-- UI Crosshair Setup
local screenGui = Instance.new("ScreenGui")
screenGui.Name = "CamlockGui"
screenGui.Parent = player:WaitForChild("PlayerGui")

local crosshair = Instance.new("ImageLabel")
crosshair.Name = "LockIcon"
crosshair.Size = UDim2.new(0, 50, 0, 50)
crosshair.BackgroundTransparency = 1
crosshair.Image = "rbxassetid://6031068433" -- Icon target default (bisa diganti)
crosshair.ImageColor3 = Color3.fromRGB(255, 0, 0)
crosshair.AnchorPoint = Vector2.new(0.5, 0.5)
crosshair.Visible = false
crosshair.Parent = screenGui

-- Fungsi mencari target (Pemain atau NPC)
local function getNearestTarget()
	local nearestDistance = maxLockDistance
	local nearestChar = nil
	local character = player.Character
	if not character or not character:FindFirstChild("HumanoidRootPart") then return nil end

	local myPos = character.HumanoidRootPart.Position

	-- Scan semua objek di workspace
	for _, obj in pairs(workspace:GetDescendants()) do
		if obj:IsA("Humanoid") and obj.Parent ~= character and obj.Health > 0 then
			local rootPart = obj.Parent:FindFirstChild("HumanoidRootPart")
			if rootPart then
				local distance = (myPos - rootPart.Position).Magnitude
				if distance < nearestDistance then
					nearestDistance = distance
					nearestChar = obj.Parent
				end
			end
		end
	end
	return nearestChar
end

-- Input Listener
UserInputService.InputBegan:Connect(function(input, gameProcessed)
	if gameProcessed then return end
	
	if input.KeyCode == keyboardKey or input.KeyCode == gamepadKey then
		if isLocked then
			isLocked = false
			currentTarget = nil
			crosshair.Visible = false
		else
			currentTarget = getNearestTarget()
			if currentTarget then
				isLocked = true
				crosshair.Visible = true
			end
		end
	end
end)

-- Loop Utama (Update Kamera & UI)
RunService:BindToRenderStep("PS_Camlock_Enhanced", Enum.RenderPriority.Camera.Value + 1, function()
	if isLocked and currentTarget and currentTarget:FindFirstChild("HumanoidRootPart") and currentTarget:FindFirstChild("Humanoid").Health > 0 then
		local targetPart = currentTarget.HumanoidRootPart
		local targetPos = targetPart.Position
		
		-- 1. Update Kamera
		local goalCFrame = CFrame.new(camera.CFrame.Position, targetPos)
		camera.CFrame = camera.CFrame:Lerp(goalCFrame, 0.15)
		
		-- 2. Update Posisi Crosshair di Layar (WorldToScreenPoint)
		local screenPos, onScreen = camera:WorldToScreenPoint(targetPos)
		if onScreen then
			crosshair.Visible = true
			crosshair.Position = UDim2.new(0, screenPos.X, 0, screenPos.Y)
			crosshair.Rotation = crosshair.Rotation + 2 -- Animasi putar biar keren
		else
			crosshair.Visible = false
		end
		
		-- Cek Jarak (Auto unlock jika terlalu jauh)
		if (player.Character.HumanoidRootPart.Position - targetPos).Magnitude > maxLockDistance then
			isLocked = false
			currentTarget = nil
			crosshair.Visible = false
		end
	else
		isLocked = false
		currentTarget = nil
		crosshair.Visible = false
	end
end)
